<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSV Visualizer - Диплом</title>
    <link rel="stylesheet" href="./style.css">
  </head>
<body class="bg-slate-50 text-slate-800 p-4 md:p-8">
    <div id="app" class="max-w-7xl mx-auto flex flex-col gap-6">
      <h1 class="text-3xl font-semibold text-slate-900">Dynamic Data Visualizer</h1>

      <div class="flex flex-col lg:grid lg:grid-cols-2 gap-6 items-stretch">
        
        <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex flex-col min-w-0">
          
          <div class="flex flex-col sm:flex-row gap-3 mb-4 items-start sm:items-center">
            <div class="flex-1 w-full">
              <label class="block text-sm font-medium text-slate-600 mb-1">Оберіть CSV файл:</label>
              <input type="file" id="csvFileInput" accept=".csv" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer" />
            </div>
            <button id="btnCreateEmpty" class="w-full sm:w-auto mt-5 sm:mt-0 bg-slate-600 hover:bg-slate-700 text-white font-medium py-2 px-4 rounded-lg transition-colors text-sm whitespace-nowrap">Створити таблицю з нуля</button>
          </div>

          <label class="block text-sm font-medium text-slate-600 mb-1">Тип графіка:</label>
          <select id="chartType" class="w-full border border-slate-300 rounded-lg p-2.5 mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
            <option value="bar">Стовпчикова (Bar)</option>
            <option value="stackedBar">Стовпчикова з накопиченням (Stacked Bar)</option>
            <option value="line">Лінійна (Line)</option>
            <option value="area">Графік з областями (Area)</option>
            <option value="pie">Кругова (Pie)</option>
            <option value="doughnut">Кільцева (Doughnut)</option>
            <option value="polarArea">Полярна (Polar Area)</option>
            <option value="radar">Радарна (Radar)</option>
            <option value="scatter">Точкова (Scatter)</option>
            <option value="bubble">Бульбашкова (Bubble)</option>
          </select>

          <label class="block text-sm font-medium text-slate-600 mb-1">Вісь X (Категорії):</label>
          <select id="xAxisSelect" disabled class="w-full border border-slate-300 rounded-lg p-2.5 mb-4 focus:ring-2 focus:ring-blue-500 outline-none"></select>

          <label class="block text-sm font-medium text-slate-600 mb-1">Вісь Y (можна обрати декілька):</label>
          <div class="mb-2">
            <label class="flex items-center gap-2 cursor-pointer font-medium text-blue-600">
              <input type="checkbox" id="selectAllY" disabled class="w-4 h-4 rounded text-blue-600" /> Обрати всі
            </label>
          </div>
          <div id="yAxisCheckboxes" class="border border-slate-300 rounded-lg p-3 max-h-48 overflow-y-auto bg-white mb-4">
            <span class="text-xs text-slate-400">Спочатку завантажте файл</span>
          </div>

          <label class="block text-sm font-medium text-slate-600 mb-1">Заголовок графіка:</label>
          <input type="text" id="chartTitle" placeholder="Мій графік" class="w-full border border-slate-300 rounded-lg p-2.5 mb-5 focus:ring-2 focus:ring-blue-500 outline-none" />

          <button id="btnRender" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition-colors mb-3">Побудувати графік</button>

          <div class="flex flex-col sm:flex-row gap-2 mt-auto">
            <select id="exportFormat" class="border border-slate-300 rounded-lg p-2.5 flex-1 focus:ring-2 focus:ring-blue-500 outline-none">
              <option value="png">PNG картинка</option>
              <option value="jpeg">JPEG картинка</option>
              <option value="pdf">PDF документ</option>
            </select>
            <button id="btnExport" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors sm:flex-1">Експортувати</button>
          </div>
        </div>

        <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex flex-col min-w-0 h-full">
          <h2 class="text-lg font-semibold text-slate-800 mb-3">Попередній перегляд даних</h2>
          <div class="flex-grow overflow-auto border border-slate-200 rounded-lg shadow-inner bg-slate-50 max-h-[400px]">
            <table class="w-full text-sm text-left border-collapse min-w-max">
              <thead id="tableHead"></thead>
              <tbody id="tableBody" class="bg-white"></tbody>
            </table>
          </div>
          
          <div class="flex flex-wrap gap-2 mt-4">
            <button id="btnAddRow" style="display: none;" class="bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300 font-medium py-2 px-3 rounded-lg text-sm transition-colors">+ Додати рядок</button>
            <button id="btnAddColumn" style="display: none;" class="bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300 font-medium py-2 px-3 rounded-lg text-sm transition-colors">+ Додати стовпчик</button>
            <button id="btnExportCSV" style="display: none;" class="bg-cyan-600 hover:bg-cyan-700 text-white font-medium py-2 px-3 rounded-lg text-sm transition-colors ml-auto">Зберегти як CSV</button>
          </div>
        </div>

      </div>

      <div id="chartContainer" class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 h-[500px]">
        <canvas id="myChart"></canvas>
      </div>
      
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
